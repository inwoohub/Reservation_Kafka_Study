services:

  mysql:
    image: mysql:8.0
    container_name: local-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=shop_db
      - MYSQL_ROOT_PASSWORD=password

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092" # 외부(스프링앱) -> 카프카 접속 포트
      # 9092 -> 클라이언트(스프링앱) <-> 카프카 메시지 통신용도
      # 9093 -> 카프카 내부 컨트롤러 전용 (Raft 투표, 리더 선출 등 그래서 1@kafka:9093 을 씀)

    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      # 이 노드가 브로커(메시지처리) + 컨트롤러(리더선출) 둘 다 담당함
      # KRaft 모드에서 주키퍼 역할까지 직접 처리

      KAFKA_NODE_ID: 1
      # KRaft에서 이 노드의 고유 ID

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # 투표에 참여할 컨트롤러 목록
      # 형식: 노드ID@호스트:포트
      # 브로커 3대면 -> 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # KRaft 클러스터 고유 식별자 ( 클로스터란? -> 카프카 브로커들의 묶음 )
      # 이게 없다면 카프카 실행 안됨

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      # 리스너 이름 : 보안 프로토콜 매핑
      # PLAINtEXT(내부) -> 암호화 없음
      # PLAINTEXT_HOST(외부) -> 암호화 없음
      # CONTROLLER(컨트롤러) -> 암호화 없음

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # 실제로 열어둘 포트 (0.0.0.0 = 모든 네트워크 인터페이스에서 수신 가능하게)
      # 29092 -> 도커 내부 수신용도
      # 9092 -> 외부 클라이언트 용도
      # 9093 -> 컨트롤러 용도

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      # 클라이언트에게 "나한테 접속하기 위한 주소"라고 알려주는 값
      # kafka:29092 -> 도커 내부에서 접속할 때
      # localhost:9092 -> 호스트 (내 PC)에서 접속할 때
      # CONTROLLER는 광고 안함 (내부 전용이라서.)

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 브로커끼리 통신할 때 쓸 리스너 지정
      # 브로커 여러 대일 때 서로 데이터 복제할 때 사용함

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # KRaft가 어떤 리스너를 컨트롤러 전용으로 쓸지 지정
      # 9093 포트를 Raft 투표/메타데이터 관리에 사용

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # 컨슈머 오프셋 저장 토픽의 복제본 수
      # 브로커 1대라 1 (실무는 3?)

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # 트랜잭션 상태 저장 토픽의 복제본 수
      # 브로커 1대라 1 (실무는 3?)

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 트랜잭션 커밋 시 최소 동기화 복제본 수
      # ISR = IN-Sync Replica (리더와 동기화된 팔로워)
      # 브로커 1대라 1 (실무는 2?)

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 존재하지 않는 토픽에 메시지 보내면 자동으로 토픽 생성
      # 학습용이라 true , 실무는 false 권장 (실수하면 토픽 생성됨)

  # http://localhost:8080 로 접속해서 확인
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092    # 👈 내부 리스너 포트

# 접속 시도 (Handshake): 스프링 앱이 localhost:9092로 접속
# 정보 확인 (Metadata): "나 로그 보내고 싶은데, 누구한테 보내면 돼?"
# 카프카 대답: "나는 localhost:9092야!" ← KAFKA_ADVERTISED_LISTENERS가 이걸 알려줌

redis:
  image: redis:7.4 # 7.4 버전 쓰기
  container_name: reservation-redis # 레디스 띄우는 컨테이너 이름
  ports:
    - "6379:6379"
